<!DOCTYPE html>
<html lang="en-US">

{% include head.html %}

<body>

  <button class="menu-toggle" id="toggle-menu" aria-label="Toggle navigation">
    <i class="material-icons">menu</i>
  </button>

  <div class="site-wrapper">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="sidebar-name">
          <a href="/" class="site-title">Veeshan<br>Rayamajhee</a>
        </div>

        <nav class="sidebar-nav" aria-label="Main navigation">
          <ul>
            <li><a href="/" {% if page.url == '/' %}class="active"{% endif %}>About</a></li>
            <li><a href="/research" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a></li>
            <li><a href="/teaching" {% if page.url contains 'teaching' %}class="active"{% endif %}>Teaching</a></li>
            <li><a href="/public" {% if page.url contains 'public' %}class="active"{% endif %}>Writing</a></li>
          </ul>
        </nav>

        <div class="sidebar-links">
          <a href="/files/CV.pdf" target="_blank" rel="noopener">CV</a>
          <a href="https://scholar.google.com/citations?user=EU1Z--4AAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>
          <a href="https://orcid.org/[YOUR-ORCID-ID]" target="_blank" rel="noopener">ORCID</a>
          <a href="https://www.researchgate.net/profile/Veeshan-Rayamajhee" target="_blank" rel="noopener">ResearchGate</a>
        </div>

        <div class="sidebar-theme">
          <button id="toggle-theme" aria-label="Toggle dark mode">
            <i class="material-icons">brightness_low</i>
          </button>
        </div>

      </div>
    </aside>

    <main class="main-content" id="main-content">
      {% if page.title and page.title != site.title %}
      <h1 class="page-title">{{ page.title }}</h1>
      {% endif %}
      <article>
        {{ content }}
      </article>
      {% include footer.html %}
    </main>

  </div>

</body>
</html>
